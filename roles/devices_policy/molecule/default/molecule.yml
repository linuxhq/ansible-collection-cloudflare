---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant

platforms:
  - name: almalinux9
    box: bento/almalinux-9.6
    cpus: 4
    memory: 4096

provisioner:
  name: ansible
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        accounts_info_api_token: "{{ lookup('env', 'CLOUDFLARE_API_TOKEN') }}"
        accounts_info_name: "{{ lookup('env', 'CLOUDFLARE_ACCOUNT_NAME') }}"

        devices_policy_account_id: "{{ _accounts_info_id }}"
        devices_policy_api_token: "{{ accounts_info_api_token }}"
        devices_policy_auto_connect: 60
        devices_policy_include:
          - address: 100.64.0.0/10
        devices_policy_service_mode_v2:
          mode: warp_tunnel_only

        devices_policy_info_account_id: "{{ _accounts_info_id }}"
        devices_policy_info_api_token: "{{ accounts_info_api_token }}"

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - check
    - converge
    - check
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
