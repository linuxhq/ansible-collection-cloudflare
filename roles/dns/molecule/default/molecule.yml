---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant

platforms:
  - name: almalinux9
    box: bento/almalinux-9.6
    cpus: 4
    memory: 4096

provisioner:
  name: ansible
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        accounts_info_api_token: "{{ lookup('env', 'CLOUDFLARE_API_TOKEN') }}"
        accounts_info_name: "{{ lookup('env', 'CLOUDFLARE_ACCOUNT_NAME') }}"

        dns_api_token: "{{ accounts_info_api_token }}"
        dns_records:
          - zone: "{{ zones_list.0.name }}"
            records:
              - record: one
                proxied: true
                type: A
                value: 8.8.8.1
              - record: two
                proxied: false
                type: A
                value: 8.8.8.2
              - record: three
                proxied: true
                type: A
                value: 8.8.8.3
              - record: four
                proxied: false
                type: A
                value: 8.8.8.4
              - record: five
                proxied: true
                type: A
                value: 8.8.8.5
              - record: six
                proxied: false
                type: A
                value: 8.8.8.6
              - record: seven
                proxied: true
                type: A
                value: 8.8.8.7
              - record: eight
                proxied: false
                type: A
                value: 8.8.8.8
              - record: nine
                proxied: true
                type: A
                value: 8.8.8.9
              - record: ten
                proxied: false
                type: A
                value: 8.8.8.10
              - record: eleven
                proxied: true
                type: A
                value: 8.8.8.11
              - record: twelve
                proxied: false
                type: A
                value: 8.8.8.12
              - record: thirteen
                proxied: true
                type: A
                value: 8.8.8.13

        zones_account_id: "{{ _accounts_info_id }}"
        zones_api_token: "{{ accounts_info_api_token }}"
        zones_list:
          - name: molecule.org
            type: full
            settings:
              - id: always_use_https
                value: 'on'
              - id: development_mode
                value: 'on'
              - id: ipv6
                value: 'off'
              - id: min_tls_version
                value: 1.3
              - id: ssl
                value: strict

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - check
    - converge
    - check
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
