---
- name: Ensure cloudflare accounts information is gathered
  tags:
    - accounts_info
  linuxhq.cloudflare.accounts_info:
    api_token: "{{ accounts_info_api_token }}"
    name: "{{ accounts_info_name }}"
  register: __accounts_info_query
  when:
    - accounts_info_api_token is not none
    - accounts_info_name is not none

- name: Ensure cloudflare accounts information is generated
  tags:
    - accounts_info
  ansible.builtin.set_fact:
    _accounts_info_id: "{{ __accounts_info_query.account.id | d(none) }}"
    _accounts_info_name: "{{ __accounts_info_query.account.name | d(none) }}"
    _accounts_info_settings: "{{ __accounts_info_query.account.settings | d({}) }}"
    _accounts_info_type: "{{ __accounts_info_query.account.type | d(none) }}"
...
