---
- name: Verify
  hosts: all

  roles:
    - access_identity_providers_info

  post_tasks:
    - name: Ensure info is verified
      ansible.builtin.assert:
        that:
          - _access_identity_providers_info_dict['onetimepin'].config.redirect_url is defined
          - _access_identity_providers_info_dict['onetimepin'].id is defined
          - _access_identity_providers_info_dict['onetimepin'].name is defined
          - _access_identity_providers_info_dict['onetimepin'].scim_config is defined
          - _access_identity_providers_info_dict['onetimepin'].scim_config | length > 0
          - _access_identity_providers_info_dict['onetimepin'].type == 'onetimepin'
          - _access_identity_providers_info_dict['onetimepin'].uid is defined
          - _access_identity_providers_info_dict['onetimepin'].version is defined
...
