---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant

platforms:
  - name: almalinux9
    box: bento/almalinux-9.6
    cpus: 4
    memory: 4096

provisioner:
  name: ansible
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        dnssec_api_token: "{{ zones_info_api_token }}"
        dnssec_info_api_token: "{{ lookup('env', 'CLOUDFLARE_API_TOKEN') }}"
        dnssec_list:
          - zone_id: "{{ _zones_info_dict['linuxhq.dev'].id }}"
            status: active

        zones_info_api_token: "{{ lookup('env', 'CLOUDFLARE_API_TOKEN') }}"

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - check
    - converge
    - check
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
