---
- name: Verify
  hosts: all

  roles:
    - dnssec_info
    - zones_info

  post_tasks:
    - name: Ensure info is verified
      ansible.builtin.assert:
        that:
          - _dnssec_info_dict['linuxhq.dev'].dnssec.algorithm == '13'
          - _dnssec_info_dict['linuxhq.dev'].dnssec.digest is defined
          - _dnssec_info_dict['linuxhq.dev'].dnssec.digest_algorithm == 'SHA256'
          - _dnssec_info_dict['linuxhq.dev'].dnssec.digest_type == '2'
          - _dnssec_info_dict['linuxhq.dev'].dnssec.ds is defined
          - _dnssec_info_dict['linuxhq.dev'].dnssec.flags == 257.0
          - _dnssec_info_dict['linuxhq.dev'].dnssec.key_tag == 2371.0
          - _dnssec_info_dict['linuxhq.dev'].dnssec.key_type == 'ECDSAP256SHA256'
          - _dnssec_info_dict['linuxhq.dev'].dnssec.public_key is defined
          - _dnssec_info_dict['linuxhq.dev'].id is defined
          - _dnssec_info_dict['linuxhq.dev'].name is defined

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        dnssec_list:
          "{{ dnssec_list |
              map('combine', {'status': 'disabled'}) }}"

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _role }}"
      loop:
        - dnssec
      loop_control:
        label: "{{ _role | d(none) }}"
        loop_var: _role
...
