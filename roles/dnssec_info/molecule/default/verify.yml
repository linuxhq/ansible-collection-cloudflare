---
- name: Verify
  hosts: all

  roles:
    - dnssec_info
    - zones_info

  post_tasks:
    - name: Ensure info is verified
      ansible.builtin.assert:
        that:
          - _dnssec_info_dict[_item].dnssec.algorithm == '13'
          - _dnssec_info_dict[_item].dnssec.digest is defined
          - _dnssec_info_dict[_item].dnssec.digest_algorithm == 'SHA256'
          - _dnssec_info_dict[_item].dnssec.digest_type == '2'
          - _dnssec_info_dict[_item].dnssec.ds is defined
          - _dnssec_info_dict[_item].dnssec.flags == 257.0
          - _dnssec_info_dict[_item].dnssec.key_tag is defined
          - _dnssec_info_dict[_item].dnssec.key_tag is number
          - _dnssec_info_dict[_item].dnssec.key_type == 'ECDSAP256SHA256'
          - _dnssec_info_dict[_item].dnssec.public_key is defined
          - _dnssec_info_dict[_item].id is defined
          - _dnssec_info_dict[_item].name is defined
      loop:
        "{{ zones_list |
            map(attribute='name', default=[]) }}"
      loop_control:
        label: "{{ _item | d(none) }}"
        loop_var: _item

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        dnssec_list:
          "{{ dnssec_list |
              map('combine', {'status': 'disabled'}) }}"
        zones_list:
          "{{ zones_list |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _role }}"
      loop:
        - dnssec
        - zones
      loop_control:
        label: "{{ _role | d(none) }}"
        loop_var: _role
...
