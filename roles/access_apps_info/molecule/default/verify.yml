---
- name: Verify
  hosts: all

  roles:
    - access_apps_info
    - access_groups_info
    - access_identity_providers_info
    - access_policies_info
    - access_service_tokens_info

  post_tasks:
    - name: Ensure info is verified
      ansible.builtin.assert:
        that:
          - _access_apps_info_dict['linuxhq.dev'].destinations.0.type == 'public'
          - _access_apps_info_dict['linuxhq.dev'].destinations.0.uri == 'linuxhq.dev'
          - _access_apps_info_dict['linuxhq.dev'].destinations.1.type == 'public'
          - _access_apps_info_dict['linuxhq.dev'].destinations.1.uri == 'molecule-00.linuxhq.dev'
          - _access_apps_info_dict['linuxhq.dev'].destinations.2.type == 'public'
          - _access_apps_info_dict['linuxhq.dev'].destinations.2.uri == 'molecule-01.linuxhq.dev'
          - _access_apps_info_dict['linuxhq.dev'].domain == 'linuxhq.dev'
          - _access_apps_info_dict['linuxhq.dev'].id is defined
          - _access_apps_info_dict['linuxhq.dev'].policies | length == 1
          - _access_apps_info_dict['linuxhq.dev'].uid is defined

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        access_apps_list:
          "{{ access_apps_list |
              map('combine', {'state': 'absent'}) }}"
        access_groups_list:
          "{{ access_groups_list |
              map('combine', {'state': 'absent'}) }}"
        access_policies_list:
          "{{ access_policies_list |
              map('combine', {'state': 'absent'}) }}"
        access_service_tokens_list:
          "{{ access_service_tokens_list |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _role }}"
      loop:
        - access_apps
        - access_policies
        - access_groups
        - access_service_tokens
      loop_control:
        label: "{{ _role | d(none) }}"
        loop_var: _role
...
