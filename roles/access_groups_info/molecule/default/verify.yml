---
- name: Verify
  hosts: all

  roles:
    - access_groups_info
    - access_service_tokens_info

  post_tasks:
    - name: Ensure info is verified
      ansible.builtin.assert:
        that:
          - _access_groups_info_dict[_item].id is defined
          - _access_groups_info_dict[_item].include.0.service_token.token_id is defined
          - _access_groups_info_dict[_item].require == []
          - _access_groups_info_dict[_item].uid is defined
      loop:
        "{{ access_groups_list |
            map(attribute='name', default=[]) }}"
      loop_control:
        label: "{{ _item | d(none) }}"
        loop_var: _item

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        access_groups_list:
          "{{ access_groups_list |
              map('combine', {'state': 'absent'}) }}"
        access_service_tokens_list:
          "{{ access_service_tokens_list |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _role }}"
      loop:
        - access_groups
        - access_service_tokens
      loop_control:
        label: "{{ _role | d(none) }}"
        loop_var: _role
...
