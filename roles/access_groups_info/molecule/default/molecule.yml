---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant

platforms:
  - name: almalinux9
    box: bento/almalinux-9.6
    cpus: 4
    memory: 4096

provisioner:
  name: ansible
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        accounts_info_api_token: "{{ lookup('env', 'CLOUDFLARE_API_TOKEN') }}"
        accounts_info_name: "{{ lookup('env', 'CLOUDFLARE_ACCOUNT_NAME') }}"

        access_groups_info_account_id: "{{ _accounts_info_id }}"
        access_groups_info_api_token: "{{ accounts_info_api_token }}"

        access_groups_account_id: "{{ _accounts_info_id }}"
        access_groups_api_token: "{{ accounts_info_api_token }}"
        access_groups_list:
          - name: molecule-00
            include:
              - service_token:
                  token_id: "{{ _access_service_tokens_info_dict['molecule-00'].id }}"
            is_default: false

          - name: molecule-01
            include:
              - service_token:
                  token_id: "{{ _access_service_tokens_info_dict['molecule-01'].id }}"
            is_default: false

          - name: molecule-02
            include:
              - service_token:
                  token_id: "{{ _access_service_tokens_info_dict['molecule-02'].id }}"
            is_default: false

        access_service_tokens_info_account_id: "{{ _accounts_info_id }}"
        access_service_tokens_info_api_token: "{{ accounts_info_api_token }}"

        access_service_tokens_account_id: "{{ _accounts_info_id }}"
        access_service_tokens_api_token: "{{ accounts_info_api_token }}"
        access_service_tokens_list:
          - name: molecule-00
            duration: forever
          - name: molecule-01
            duration: forever
          - name: molecule-02
            duration: forever

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - check
    - converge
    - check
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
