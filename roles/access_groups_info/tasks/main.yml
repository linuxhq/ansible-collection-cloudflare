---
- name: Ensure cloudflare access groups information is gathered
  tags:
    - access_groups_info
  linuxhq.cloudflare.access_groups_info:
    account_id: "{{ access_groups_info_account_id }}"
    api_token: "{{ access_groups_info_api_token }}"
  register: __access_groups_info_query
  when:
    - access_groups_info_account_id is not none
    - access_groups_info_api_token is not none

- name: Ensure list of cloudflare access groups information is generated
  tags:
    - access_groups_info
  ansible.builtin.set_fact:
    _access_groups_info_list:
      "{{ __access_groups_info_query.access_groups |
          d([]) }}"

- name: Ensure dict of cloudflare access groups information is generated
  tags:
    - access_groups_info
  ansible.builtin.set_fact:
    _access_groups_info_dict:
      "{{ (dict(_access_groups_info_list |
               json_query('[].name') |
               zip(_access_groups_info_list))) |
          d({}) }}"
...
