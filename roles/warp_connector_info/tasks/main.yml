---
- name: Ensure cloudflare warp connectors information is gathered
  tags:
    - warp_connector_info
  linuxhq.cloudflare.warp_connector_info:
    account_id: "{{ warp_connector_info_account_id }}"
    api_token: "{{ warp_connector_info_api_token }}"
  register: __warp_connector_info_query
  when:
    - warp_connector_info_account_id is not none
    - warp_connector_info_api_token is not none

- name: Ensure list of cloudflare warp connectors information is generated
  tags:
    - warp_connector_info
  ansible.builtin.set_fact:
    _warp_connector_info_list:
      "{{ __warp_connector_info_query.warp_connectors |
          d([]) }}"

- name: Ensure dict of cloudflare warp connectors information is generated
  tags:
    - warp_connector_info
  ansible.builtin.set_fact:
    _warp_connector_info_dict:
      "{{ (dict(_warp_connector_info_list |
               json_query('[].name') |
               zip(_warp_connector_info_list))) |
          d({}) }}"
...
