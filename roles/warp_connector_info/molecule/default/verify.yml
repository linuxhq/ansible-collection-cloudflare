---
- name: Verify
  hosts: all

  roles:
    - warp_connector_info

  post_tasks:
    - name: Ensure info is verified
      ansible.builtin.assert:
        that:
          - _warp_connector_info_dict[_item].account_tag is defined
          - _warp_connector_info_dict[_item].connections | length == 0
          - _warp_connector_info_dict[_item].id is defined
          - _warp_connector_info_dict[_item].name is defined
          - _warp_connector_info_dict[_item].status == 'inactive'
          - _warp_connector_info_dict[_item].token is defined
          - _warp_connector_info_dict[_item].tun_type == 'warp_connector'
      loop:
        "{{ warp_connector_list |
            map(attribute='name', default=[]) }}"
      loop_control:
        label: "{{ _item | d(none) }}"
        loop_var: _item

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        warp_connector_list:
          "{{ warp_connector_list |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _role }}"
      loop:
        - warp_connector
      loop_control:
        label: "{{ _role | d(none) }}"
        loop_var: _role
...
