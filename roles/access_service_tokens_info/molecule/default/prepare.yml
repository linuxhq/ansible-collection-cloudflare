---
- name: Prepare
  hosts: all
  tasks:
    - name: Ensure python pip package is present
      become: true
      ansible.builtin.dnf:
        name: python3-pip
        state: present

    - name: Ensure python cloudflare package is present
      become: true
      ansible.builtin.pip:
        executable: /bin/pip
        name:
          - cloudflare
...
