---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant

platforms:
  - name: almalinux9
    box: bento/almalinux-9.6
    cpus: 4
    memory: 4096

provisioner:
  name: ansible
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        accounts_info_api_token: "{{ lookup('env', 'CLOUDFLARE_API_TOKEN') }}"
        accounts_info_name: "{{ lookup('env', 'CLOUDFLARE_ACCOUNT_NAME') }}"
        access_service_tokens_account_id: "{{ _accounts_info_id }}"
        access_service_tokens_api_token: "{{ accounts_info_api_token }}"
        access_service_tokens_list:
          - name: molecule-00
            duration: forever
          - name: molecule-01
          - name: molecule-02
            duration: forever
          - name: molecule-03
          - name: molecule-04
            duration: forever
          - name: molecule-05
          - name: molecule-06
            duration: forever
          - name: molecule-07
          - name: molecule-08
            duration: forever
          - name: molecule-09
          - name: molecule-10
            duration: forever
          - name: molecule-11

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - check
    - converge
    - check
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
