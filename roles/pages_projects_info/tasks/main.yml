---
- name: Ensure cloudflare pages projects information is gathered
  tags:
    - pages_projects_info
  linuxhq.cloudflare.pages_projects_info:
    account_id: "{{ pages_projects_info_account_id }}"
    api_token: "{{ pages_projects_info_api_token }}"
  register: __pages_projects_info_query
  when:
    - pages_projects_info_account_id is not none
    - pages_projects_info_api_token is not none

- name: Ensure list of cloudflare pages project information is generated
  tags:
    - pages_projects_info
  ansible.builtin.set_fact:
    _pages_projects_info_list:
      "{{ __pages_projects_info_query.pages_projects |
          d([]) }}"

- name: Ensure dict of cloudflare pages project information is generated
  tags:
    - pages_projects_info
  ansible.builtin.set_fact:
    _pages_projects_info_dict:
      "{{ (dict(_pages_projects_info_list |
               json_query('[].name') |
               zip(_pages_projects_info_list))) |
          d({}) }}"
...
