---
- name: Ensure cloudflare devices policy information is gathered
  tags:
    - devices_policy_info
  linuxhq.cloudflare.devices_policy_info:
    account_id: "{{ devices_policy_info_account_id }}"
    api_token: "{{ devices_policy_info_api_token }}"
  register: __devices_policy_info_query
  when:
    - devices_policy_info_account_id is not none
    - devices_policy_info_api_token is not none

- name: Ensure cloudflare devices policy information is generated
  tags:
    - devices_policy_info
  ansible.builtin.set_fact:
    _devices_policy_info_dict:
      "{{ __devices_policy_info_query.devices_policy |
          d({}) }}"
...
