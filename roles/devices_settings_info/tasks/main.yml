---
- name: Ensure cloudflare devices settings information is gathered
  tags:
    - devices_settings_info
  linuxhq.cloudflare.devices_settings_info:
    account_id: "{{ devices_settings_info_account_id }}"
    api_token: "{{ devices_settings_info_api_token }}"
  register: __devices_settings_info_query
  when:
    - devices_settings_info_account_id is not none
    - devices_settings_info_api_token is not none

- name: Ensure cloudflare devices settings information is generated
  tags:
    - devices_settings_info
  ansible.builtin.set_fact:
    _devices_settings_info_dict:
      "{{ __devices_settings_info_query.devices_settings |
          d({}) }}"
...
