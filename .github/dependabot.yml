---
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
      include: scope
    ignore:
      - dependency-name: molecule
        versions:
          - '>=25.2.0'
      - dependency-name: molecule-plugins
        versions:
          - '>=25.0.0'

  - package-ecosystem: pre-commit
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
      include: scope
...
