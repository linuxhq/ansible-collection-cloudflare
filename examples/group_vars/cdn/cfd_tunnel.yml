---
cfd_tunnel_account_id: "{{ _accounts_info_id }}"
cfd_tunnel_api_token: "{{ cloudflare_api_token }}"

cfd_tunnel_info_account_id: "{{ _accounts_info_id }}"
cfd_tunnel_info_api_token: "{{ cloudflare_api_token }}"

cfd_tunnel_list:
  - name: "{{ cloudflare_domain }}-cfd"
    config_src: local
    tunnel_secret: "{{ lookup('env', 'CLOUDFLARE_TUNNEL_SECRET') }}"

  - name: "{{ cloudflare_domain }}-remote"
    config_src: cloudflare
...
