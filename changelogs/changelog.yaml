---
ancestor: null
releases:
  2.0.6:
    changes:
      breaking_changes:
        - device_policy - defaults have been broken out into individual variables
        - pages_projects - dns additions removed, use dns role instead
      minor_changes:
        - all - migrated from uri wrappers to custom ansible modules
        - all - added async support to applicable roles
      release_summary:
        This release adds async support where applicable and custom modules
  2.0.5:
    changes:
      breaking_changes:
        - cfd_tunnel - must define config_src for each tunnel in inventory
      minor_changes:
        - all - remove box_architecture from molecule config
        - all - remove tags from molecule verify plays
        - cfd_tunnel - add support for cloudflare managed tunnels
        - cfd_tunnel_configurations - initial commit
        - cfd_tunnel_configurations_info - initial commit
      release_summary:
        This release adds support for cloudflare managed tunnels
  2.0.4:
    changes:
      minor_changes:
        - access_identity_providers_info - initial commit
        - access_policies - add meta dependency access_identity_providers_info
      release_summary:
        This release introduces new role access_identity_providers_info
  2.0.3:
    changes:
      minor_changes:
        - dnssec - initial commit
        - dnssec_info - initial commit
      release_summary:
        This release introduces two new cloudflare dnssec related roles
  2.0.2:
    changes:
      minor_changes:
        - devices_policy - initial commit
        - devices_policy_info - initial commit
        - devices_settings - initial commit
        - devices_settings_info - initial commit
        - warp_connector - initial commit
        - warp_connector_info - initial commit
        - zerotrust_connectivity_settings - initial commit
        - zerotrust_connectivity_settings_info - initial commit
      release_summary:
        This release introduces eight new cloudflare warp related roles
  2.0.1:
    changes:
      minor_changes:
        - access_apps - add support for destinations
      release_summary: >-
        This release adds support for the destinations option in the access_apps role.
        This allows for multiple domains to be associated with a single application.
